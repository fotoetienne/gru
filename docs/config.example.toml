# Gru configuration file
# Location: ~/.gru/config.toml
#
# All sections and fields are optional. Defaults are shown in comments.
# Uncomment and modify the sections you need.

# ─────────────────────────────────────────────────────────────────────
# GitHub Enterprise Server (GHES) hosts
# ─────────────────────────────────────────────────────────────────────
# Define named hosts so you can reference them in daemon.repos as
# "name:owner/repo" instead of spelling out "ghe.example.com/owner/repo".
#
# You can define as many hosts as you need. github.com is always
# available implicitly — you don't need to define it here.

# [github_hosts.mycompany]
# host = "ghe.mycompany.com"
# # web_url is optional — only set it if the web UI lives on a different
# # domain than the git/API host (uncommon).
# # web_url = "https://github.mycompany.com"

# Example: a second GHES instance
# [github_hosts.labs]
# host = "git.labs.example.com"

# ─────────────────────────────────────────────────────────────────────
# Daemon settings (used by `gru lab`)
# ─────────────────────────────────────────────────────────────────────
# The [daemon] section configures Lab mode, where Gru continuously
# polls for gru:todo issues and spawns Minions to work on them.
# This section is required for `gru lab` but optional for `gru do`.

# [daemon]
# Repositories to monitor. Required for `gru lab`.
# Three formats are supported:
#   "owner/repo"              — github.com (most common)
#   "name:owner/repo"         — uses a named host from [github_hosts]
#   "ghe.example.com/org/svc" — legacy explicit-host format
#
# Multi-repo example:
# repos = [
#     "myorg/frontend",
#     "myorg/backend",
#     "mycompany:internal/platform",
# ]

# How often to poll for new issues, in seconds.
# When idle, the interval doubles each cycle up to poll_interval_max_secs.
# poll_interval_secs = 30

# Maximum poll interval in seconds for adaptive backoff (default: 300 = 5 min).
# The poll interval backs off exponentially when idle and resets on activity.
# poll_interval_max_secs = 300

# Maximum Minions running at the same time.
# max_slots = 2

# Issue label that triggers Gru to pick up work.
# label = "gru:todo"

# How many times to resume a stuck Minion before marking it failed.
# max_resume_attempts = 3

# Maximum failure retry attempts before giving up (0 = no failure retries).
# Continuation retries (re-launching when an agent exits but work remains)
# are always enabled regardless of this setting.
# max_retry_attempts = 3

# Maximum backoff delay in seconds for failure retries.
# Backoff formula: min(10s × 2^(attempt-1), max_retry_backoff_secs)
# max_retry_backoff_secs = 300

# Hours before a stopped Minion with no archivable signal (no PR, issue
# still open) is auto-archived and hidden from `gru status`. Set to 0
# to disable TTL-based archiving.
# archive_ttl_hours = 24

# Minutes an issue can be gru:in-progress with no live Minion before the
# lab auto-resets it to the configured daemon pickup label (`daemon.label`).
# Set to 0 to disable (recommended for multi-lab deployments where another
# machine may hold the issue).
# recovery_threshold_mins = 30

# Auto-recovery escalation: when an issue is reset too many times without
# making forward progress, escalate it to gru:blocked instead of resetting.
# Remove gru:blocked and re-add the daemon pickup label (for example
# gru:todo) manually to re-enable automatic retries.
#
# [daemon.auto_recovery]
# Maximum resets within the window before escalation (0 = disabled, i.e.
# reset indefinitely).
# max_resets = 2
#
# Sliding window in hours within which repeated resets are counted.
# window_hours = 2

# ─────────────────────────────────────────────────────────────────────
# Agent backend
# ─────────────────────────────────────────────────────────────────────
# Configure which AI agent Gru delegates coding work to.

# [agent]
# Which backend to use by default. Options: "claude", "codex"
# Can be overridden per-run with `gru do 42 --agent codex`.
# For codex setup details, see docs/AGENTS.md.
# default = "claude"

# [agent.claude]
# Override the Claude Code CLI binary path. Useful if claude is
# installed somewhere other than your $PATH.
# Can be set without [agent] above if you only need a binary override.
# binary = "/usr/local/bin/claude"

# Maximum agent turns for CI fix invocations. When unset (the default),
# there is no turn limit — the 20-minute wall-clock cap is the primary bound.
# Set to a positive value to impose an explicit turn budget (e.g. 50).
# ci_fix_max_turns = 50

# ─────────────────────────────────────────────────────────────────────
# Merge readiness
# ─────────────────────────────────────────────────────────────────────
# Controls when Gru considers a PR safe to merge.

# [merge]
# Confidence threshold for the merge-readiness judge (recommended: 1-10).
# Higher = more conservative. The judge must score >= this value
# before Gru will merge a PR.
# confidence_threshold = 8

# ─────────────────────────────────────────────────────────────────────
# Full GHES example
# ─────────────────────────────────────────────────────────────────────
# Here's a complete config for a team using GitHub Enterprise Server
# with two repos, higher concurrency, and a custom agent binary:
#
# [github_hosts.corp]
# host = "ghe.corp.com"
#
# [daemon]
# repos = [
#     "corp:platform/api-gateway",
#     "corp:platform/web-ui",
# ]
# poll_interval_secs = 60
# poll_interval_max_secs = 300
# max_slots = 4
# max_resume_attempts = 5
# archive_ttl_hours = 48
#
# [agent]
# default = "claude"
#
# [agent.claude]
# binary = "/opt/tools/claude"
#
# [merge]
# confidence_threshold = 9
